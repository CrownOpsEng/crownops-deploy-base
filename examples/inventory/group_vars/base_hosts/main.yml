---
bootstrap_target_ubuntu_release: jammy
bootstrap_admin_user: deploy
bootstrap_admin_group: deploy
bootstrap_admin_authorized_keys:
  - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAITestBaseCollectionKey deploy@example

host_ufw:
  enabled: true
  logging: low
  default_incoming_policy: deny
  default_outgoing_policy: allow
  managed_state_dir: /etc/crownops
  managed_state_file: /etc/crownops/host-ufw-rules.json
  baseline_tcp_public:
    - 22
  baseline_udp_public: []
  requests:
    - name: https-public
      port: 443
      proto: tcp
      from: any
      comment: crownops host_ufw https
