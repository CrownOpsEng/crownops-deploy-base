---
- name: Create Docker apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"

- name: Read Docker GPG key fingerprint
  ansible.builtin.command:
    argv:
      - gpg
      - --show-keys
      - --with-colons
      - /etc/apt/keyrings/docker.asc
  register: bootstrap_docker_keyring_info
  changed_when: false

- name: Assert Docker GPG key fingerprint matches the reviewed value
  ansible.builtin.assert:
    that:
      - bootstrap_docker_apt_key_fingerprint in bootstrap_docker_keyring_info.stdout
    fail_msg: >-
      Docker apt signing key fingerprint did not match {{ bootstrap_docker_apt_key_fingerprint }}.
      Refusing to trust the downloaded key.

- name: Install Docker apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    owner: root
    group: root
    mode: "0644"
    content: |
      deb [arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable

- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ bootstrap_docker_packages }}"
    state: present
    update_cache: true

- name: Ensure Docker service is enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add configured users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ bootstrap_docker_users }}"
