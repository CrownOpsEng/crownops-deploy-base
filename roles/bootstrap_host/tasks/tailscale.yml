---
- name: Create Tailscale keyring directory
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install Tailscale apt signing key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_distribution_release }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    owner: root
    group: root
    mode: "0644"

- name: Read Tailscale GPG key fingerprint
  ansible.builtin.command:
    argv:
      - gpg
      - --show-keys
      - --with-colons
      - /usr/share/keyrings/tailscale-archive-keyring.gpg
  register: bootstrap_tailscale_keyring_info
  changed_when: false

- name: Assert Tailscale GPG key fingerprint matches the reviewed value
  ansible.builtin.assert:
    that:
      - bootstrap_tailscale_apt_key_fingerprint in bootstrap_tailscale_keyring_info.stdout
    fail_msg: >-
      Tailscale apt signing key fingerprint did not match {{ bootstrap_tailscale_apt_key_fingerprint }}.
      Refusing to trust the downloaded key.

- name: Install Tailscale apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/tailscale.list
    owner: root
    group: root
    mode: "0644"
    content: |
      # Tailscale packages for ubuntu {{ ansible_distribution_release }}
      deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu {{ ansible_distribution_release }} main

- name: Install Tailscale package
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Ensure tailscaled service is enabled
  ansible.builtin.service:
    name: tailscaled
    state: started
    enabled: true

- name: Check current Tailscale state
  ansible.builtin.command:
    argv:
      - tailscale
      - status
      - --json
  register: bootstrap_tailscale_status
  changed_when: false
  failed_when: false

- name: Parse current Tailscale state
  ansible.builtin.set_fact:
    bootstrap_tailscale_status_json: >-
      {{
        (bootstrap_tailscale_status.stdout | from_json)
        if (bootstrap_tailscale_status.rc == 0 and (bootstrap_tailscale_status.stdout | string | trim) != '')
        else {}
      }}
    bootstrap_tailscale_needs_join: >-
      {{
        (bootstrap_tailscale_auth_key | string | trim) != ''
        and (
          bootstrap_tailscale_status.rc != 0
          or (bootstrap_tailscale_status_json.BackendState | default('')) in ['NeedsLogin', 'NoState']
          or (((bootstrap_tailscale_status_json.Self | default({})).ID | default('') | string | trim) == '')
        )
      }}

- name: Validate configured Tailscale tags
  ansible.builtin.assert:
    that:
      - (bootstrap_tailscale_tags | select('match', '^tag:') | list | length) == (bootstrap_tailscale_tags | length)
    fail_msg: >-
      bootstrap_tailscale_tags must use full Tailscale tag names with the tag: prefix,
      for example tag:core.
  when:
    - (bootstrap_tailscale_tags | length) > 0

- name: Build tailscale up argv
  ansible.builtin.set_fact:
    bootstrap_tailscale_up_argv: >-
      {{
        ['tailscale', 'up', '--authkey', bootstrap_tailscale_auth_key, '--hostname', bootstrap_tailscale_hostname]
        + (
          ['--advertise-tags=' ~ (bootstrap_tailscale_tags | join(','))]
          if (bootstrap_tailscale_tags | length) > 0
          else []
        )
      }}
  when:
    - bootstrap_tailscale_needs_join | bool

- name: Join tailnet when auth key is configured
  ansible.builtin.command:
    argv: "{{ bootstrap_tailscale_up_argv }}"
  no_log: true
  when:
    - bootstrap_tailscale_needs_join | bool
