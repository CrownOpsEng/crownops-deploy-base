---
bootstrap_target_ubuntu_release: jammy
bootstrap_supported_ubuntu_releases:
  - jammy
  - noble

bootstrap_hostname: ""
bootstrap_timezone: UTC

bootstrap_apt_upgrade_mode: dist
bootstrap_apt_cache_valid_time: 3600
bootstrap_base_packages:
  - acl
  - ca-certificates
  - curl
  - fail2ban
  - git
  - gnupg
  - jq
  - lsb-release
  - python3
  - python3-apt
  - python3-pip
  - rsync
  - sudo
  - ufw
  - unattended-upgrades
  - wget
bootstrap_extra_packages: []

bootstrap_admin_user: deploy
bootstrap_admin_group: "{{ bootstrap_admin_user }}"
bootstrap_admin_shell: /bin/bash
bootstrap_admin_groups:
  - sudo
bootstrap_admin_append_groups: true
bootstrap_admin_authorized_keys: []
bootstrap_admin_password_lock: true
bootstrap_admin_create_home: true
bootstrap_admin_manage_sudoers: true
bootstrap_admin_sudo_nopasswd: true

bootstrap_manage_sshd_hardening: true
bootstrap_sshd_drop_in_path: /etc/ssh/sshd_config.d/99-crownops-base.conf
bootstrap_ssh_password_authentication: "no"
bootstrap_ssh_permit_root_login: "no"
bootstrap_ssh_pubkey_authentication: "yes"
bootstrap_ssh_kbd_interactive_authentication: "no"
bootstrap_ssh_challenge_response_authentication: "no"
bootstrap_ssh_use_pam: "yes"
bootstrap_ssh_x11_forwarding: "no"
bootstrap_ssh_allow_agent_forwarding: "no"
bootstrap_ssh_allow_tcp_forwarding: "yes"
bootstrap_ssh_client_alive_interval: 300
bootstrap_ssh_client_alive_count_max: 2

bootstrap_manage_ufw: true
bootstrap_ufw_logging: low
bootstrap_ufw_default_incoming_policy: deny
bootstrap_ufw_default_outgoing_policy: allow
bootstrap_require_ssh_port_open: true
bootstrap_ufw_allowed_tcp_public:
  - 22
bootstrap_ufw_allowed_udp_public: []

bootstrap_manage_fail2ban: true
bootstrap_fail2ban_bantime: 1h
bootstrap_fail2ban_findtime: 10m
bootstrap_fail2ban_maxretry: 5

bootstrap_enable_unattended_upgrades: true
bootstrap_unattended_upgrades_autoclean_interval: 7

bootstrap_install_docker: false
bootstrap_docker_apt_key_fingerprint: 9DC858229FC7DD38854AE2D88D81803C0EBFCD88
bootstrap_docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
bootstrap_docker_users:
  - "{{ bootstrap_admin_user }}"

bootstrap_install_tailscale: false
bootstrap_tailscale_apt_key_fingerprint: 2596A99EAAB33821893C0A79458CA832957F5868
bootstrap_tailscale_auth_key: ""
bootstrap_tailscale_hostname: "{{ bootstrap_hostname | default(inventory_hostname, true) }}"
bootstrap_tailscale_tags: []
